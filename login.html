<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#152484">
<title>홍성훈 · 수박게임</title>
<link rel="stylesheet" href="ui-overlay.css?v=7">
<style>
  body {
    margin: 0; padding: 0;
    min-height: 100vh; min-height: 100dvh;
    background:
      linear-gradient(160deg, rgba(21,36,132,0.78) 0%, rgba(42,58,168,0.65) 50%, rgba(0,160,233,0.55) 100%),
      url('rpdla.png?v=4') center center / cover no-repeat fixed;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }
  .start-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 360px; padding: 36px 28px 24px;
    margin: 16px;
    background: rgba(255,255,255,0.97);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .brand-circle {
    width: 84px; height: 84px;
    margin: 0 auto 14px;
    background: linear-gradient(135deg, #152484, #00A0E9);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 32px; font-weight: 900;
    box-shadow: 0 8px 20px rgba(21,36,132,0.3);
  }
  .brand-name { font-size: 24px; font-weight: 900; color: #152484; letter-spacing: -0.02em; }
  .brand-party { font-size: 12px; font-weight: 700; color: #00A0E9; letter-spacing: 0.2em; margin-top: 4px; margin-bottom: 14px; }
  .game-title {
    font-size: 17px; font-weight: 700; color: #1A1A1A;
    margin: 6px 0 28px; padding: 8px 18px;
    background: #F4F6FB; border-radius: 999px; display: inline-block;
  }
  .btn-start {
    display: block; width: 100%; padding: 18px;
    background: linear-gradient(135deg, #152484, #00A0E9);
    color: #fff; border: none; border-radius: 16px;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(21,36,132,0.35);
    -webkit-tap-highlight-color: transparent;
    transition: transform .1s;
  }
  .btn-start:active { transform: translateY(2px); }
  .admin-link {
    display: inline-block; margin-top: 16px;
    font-size: 11px; color: #8A8A8A; text-decoration: none;
    letter-spacing: 0.05em;
    padding: 6px 10px;
  }
  .admin-link:active { color: #152484; }
</style>
</head>
<body>
  <main class="start-wrap">
    <div class="brand-circle">홍</div>
    <div class="brand-name">홍성훈</div>
    <div class="brand-party">조 국 혁 신 당</div>
    <div class="game-title">🍉 수박게임</div>
    <button id="btnStart" class="btn-start">▶ 시작하기</button>
    <a href="#" id="adminLink" class="admin-link">관리자 로그인</a>
  </main>

<script src="js/swg-app.js?v=4"></script>
<script>
(async () => {
  await SWGApp.init();
  if (SWGApp.session()) { location.href = 'index.html'; return; }

  document.getElementById('btnStart').addEventListener('click', async () => {
    await SWGApp.guest();
    location.href = 'index.html';
  });

  document.getElementById('adminLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const u = prompt('관리자 아이디:');
    if (!u) return;
    const p = prompt('비밀번호:');
    if (p === null) return;
    try {
      await SWGApp.login(u, p);
      location.href = 'index.html';
    } catch (ex) {
      alert(ex.message);
    }
  });
})();
</script>
</body>
</html>
