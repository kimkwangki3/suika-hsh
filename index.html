<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>수박게임 · 홍성훈 · 조국혁신당</title>
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#152484">
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />
    <meta name="x5-page-mode" content="app">

    <link rel="stylesheet" type="text/css" href="style-mobile.css" />
    <link rel="stylesheet" type="text/css" href="ui-overlay.css?v=10" />
</head>

<body align="center">

    <!-- 모바일 헤더 -->
    <header id="suikaTopbar">
        <button id="suikaMenuBtn" class="hb-btn" aria-label="메뉴">☰</button>
        <div class="brand">
            <span class="brand-name">홍성훈</span>
            <span class="brand-sub">조국혁신당 · 수박게임</span>
        </div>
        <div class="user-pill"><span id="suikaUser">-</span></div>
    </header>

    <!-- 사이드 메뉴 -->
    <div id="suikaMenuBackdrop" class="menu-backdrop"></div>
    <nav id="suikaMenu" class="side-menu">
        <div class="sm-head">
            <div class="sm-name">홍성훈</div>
            <div class="sm-sub">조국혁신당</div>
        </div>
        <div class="sm-user">
            <span class="sm-label">사용자</span>
            <strong id="suikaUserMenu">-</strong>
            <span id="suikaRole" class="sm-role"></span>
        </div>
        <a href="index.html" class="sm-item active">🍉 게임</a>
        <div class="sm-rank-head">
            <span>🏆 순위 TOP 5</span>
            <button id="smRankRefresh" class="sm-rank-refresh" type="button" title="새로고침">⟳</button>
        </div>
        <ol id="smRankList" class="sm-rank-list"></ol>
        <div id="smRankEmpty" class="sm-rank-empty" style="display:none">아직 등록된 점수가 없습니다</div>
        <a href="admin.html" id="suikaAdminLink" class="sm-item" style="display:none">⚙️ 관리자 (이미지 교체)</a>
        <button id="suikaLogout" class="sm-item logout">↪ 로그아웃</button>
        <div class="sm-foot">© Hong Sung-hoon · Rebuilding Korea Party</div>
    </nav>

    <div style="align:center;display: none"><img src="res/share.jpg" width="10%" /></div>

    <!-- 점수 등록 플로팅 버튼 -->
    <button id="btnRegScore" class="reg-fab">📝 점수 등록</button>

    <!-- 점수 등록 모달 -->
    <div id="regModal" class="reg-modal">
      <div class="reg-box">
        <div class="reg-title">🏆 점수 등록</div>
        <div class="reg-desc">닉네임만 입력하면 됩니다. 점수는 자동입니다.</div>
        <div class="reg-row">
          <label for="regNick">닉네임</label>
          <input type="text" id="regNick" maxlength="20" placeholder="1~20자" autocomplete="off">
        </div>
        <div class="reg-row">
          <label for="regScore">점수 (자동)</label>
          <input type="number" id="regScore" min="0" max="99999999" inputmode="numeric" readonly placeholder="게임에서 자동으로 가져옴">
        </div>
        <div class="reg-err" id="regErr"></div>
        <div class="reg-actions">
          <button class="reg-btn reg-cancel" id="regCancel" type="button">취소</button>
          <button class="reg-btn reg-submit" id="regSubmit" type="button">등록하기</button>
        </div>
      </div>
    </div>

    <div id="canvasDiv">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
        <video id="contentElement" style="display:none;position: absolute;top:0px;left: 0px;">
            <source src="http://rmcdn.2mdn.net/Demo/vast_inspector/android.mp4"></source>
            <source src="http://rmcdn.2mdn.net/Demo/vast_inspector/android.webm"></source>
        </video>
        <div id="block-Box" style="display:block;width:100%;height:100%;"></div>
    </div>

    <div id="adContainer" style="display:none;position: absolute;top:0px;left: 0px;width:100%;height:100%;z-index:999;"></div>
    <div id="loadingText">loading......0%</div>

    <div id="splash"></div>

    <div id="loadingImg">
        <img src="res/loading.gif" width="7%" height="7%" />
    </div>

    <!-- 인증 + SW 등록 (가장 먼저) -->
    <script src="js/swg-app.js?v=3"></script>
    <script>
        (async () => {
            await SWGApp.init();
            const sess = SWGApp.require('login.html');
            if (!sess) return;
            document.getElementById('suikaUser').textContent = sess.u;
            document.getElementById('suikaUserMenu').textContent = sess.u;
            document.getElementById('suikaRole').textContent = sess.role === 'admin' ? '관리자' : '일반';
            if (sess.role === 'admin') {
                document.getElementById('suikaAdminLink').style.display = '';
            }
            // SW 등록 (자산 인터셉트)
            SWGApp.registerSW();

            // 메뉴 열고 닫기
            const menu = document.getElementById('suikaMenu');
            const bd = document.getElementById('suikaMenuBackdrop');
            const open = () => { menu.classList.add('open'); bd.classList.add('show'); loadSideRank(); };
            const close = () => { menu.classList.remove('open'); bd.classList.remove('show'); };
            document.getElementById('suikaMenuBtn').addEventListener('click', open);
            bd.addEventListener('click', close);
            document.getElementById('suikaLogout').addEventListener('click', () => {
                SWGApp.logout();
                location.href = 'login.html';
            });

            // ===== 사이드 메뉴 1~5위 =====
            const smRankList = document.getElementById('smRankList');
            const smRankEmpty = document.getElementById('smRankEmpty');
            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            }
            async function loadSideRank() {
                try {
                    const r = await fetch('/api/top?limit=5', { cache: 'no-store' });
                    if (!r.ok) throw new Error('api');
                    const rows = await r.json();
                    if (!rows.length) {
                        smRankList.innerHTML = '';
                        smRankEmpty.style.display = '';
                        return;
                    }
                    smRankEmpty.style.display = 'none';
                    smRankList.innerHTML = rows.map((row, i) => `
                        <li class="r${i+1}">
                            <span class="rb">${i+1}</span>
                            <span class="nk">${escapeHtml(row.nickname)}</span>
                            <span class="sc">${Number(row.score).toLocaleString()}</span>
                        </li>
                    `).join('');
                } catch (e) {
                    smRankList.innerHTML = '';
                    smRankEmpty.textContent = '순위를 불러오지 못했습니다';
                    smRankEmpty.style.display = '';
                }
            }
            document.getElementById('smRankRefresh').addEventListener('click', loadSideRank);
            loadSideRank();

            // ===== 게임 종료 감지 + 점수 자동 추출 =====
            // 게임 종료 시 cc.sys.localStorage('...playerData11')에 score/highScore가 저장됨
            // 이 setItem 호출을 후킹해서 정확한 종료 시점에 등록 버튼을 노출.
            const regBtn = document.getElementById('btnRegScore');
            window.__suikaLastScore = 0;

            function showRegBtn(score) {
                if (Number.isFinite(score) && score > 0) {
                    window.__suikaLastScore = score;
                }
                regBtn.classList.add('show');
            }
            function hideRegBtn() {
                regBtn.classList.remove('show');
            }
            function pickScoreFromPlayerData(data) {
                if (!data) return 0;
                const sc = Number(data.score) || 0;
                const hs = Number(data.highScore) || 0;
                return Math.max(sc, hs);
            }

            // 1) localStorage.setItem 후킹 — 게임이 점수를 저장하는 순간을 정확히 잡음
            try {
                const origSetItem = localStorage.setItem.bind(localStorage);
                localStorage.setItem = function (key, value) {
                    const result = origSetItem(key, value);
                    try {
                        if (typeof key === 'string' && key.endsWith('playerData11')) {
                            const data = JSON.parse(value);
                            const s = pickScoreFromPlayerData(data);
                            if (s > 0) showRegBtn(s);
                        }
                    } catch (e) {}
                    return result;
                };
            } catch (e) {}

            // 2) 폴링 백업 — 후킹이 어떤 이유로 누락되어도 게임 종료를 감지
            (function pollPlayerData() {
                let lastSeen = null;
                setInterval(() => {
                    try {
                        for (let i = 0; i < localStorage.length; i++) {
                            const k = localStorage.key(i);
                            if (k && k.endsWith('playerData11')) {
                                const data = JSON.parse(localStorage.getItem(k));
                                const sc = Number(data.score) || 0;
                                if (lastSeen !== null && sc !== lastSeen && sc > 0) {
                                    showRegBtn(pickScoreFromPlayerData(data));
                                }
                                lastSeen = sc;
                                break;
                            }
                        }
                    } catch (e) {}
                }, 1500);
            })();

            // ===== 점수 등록 모달 =====
            const regModal = document.getElementById('regModal');
            const regNick = document.getElementById('regNick');
            const regScore = document.getElementById('regScore');
            const regErr = document.getElementById('regErr');
            const regSubmit = document.getElementById('regSubmit');
            const regCancel = document.getElementById('regCancel');

            const openReg = () => {
                regErr.textContent = '';
                regNick.value = localStorage.getItem('swg_last_nick') || '';
                regScore.value = window.__suikaLastScore > 0 ? String(window.__suikaLastScore) : '';
                regModal.classList.add('show');
                setTimeout(() => regNick.focus(), 50);
            };
            const closeReg = () => regModal.classList.remove('show');

            document.getElementById('btnRegScore').addEventListener('click', openReg);
            regCancel.addEventListener('click', closeReg);
            regModal.addEventListener('click', (e) => { if (e.target === regModal) closeReg(); });

            regSubmit.addEventListener('click', async () => {
                regErr.textContent = '';
                const nick = regNick.value.trim();
                const score = parseInt(regScore.value, 10);
                if (nick.length < 1 || nick.length > 20) { regErr.textContent = '닉네임은 1~20자'; return; }
                if (!Number.isFinite(score) || score < 0 || score > 99999999) { regErr.textContent = '점수가 올바르지 않습니다'; return; }
                regSubmit.disabled = true; regCancel.disabled = true;
                try {
                    const r = await fetch('/api/scores', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nickname: nick, score })
                    });
                    const data = await r.json();
                    if (!r.ok) throw new Error(data.error || '등록 실패');
                    localStorage.setItem('swg_last_nick', nick);
                    closeReg();
                    hideRegBtn();
                    window.__suikaLastScore = 0;
                    loadSideRank();
                    alert('등록 완료! 메뉴에서 순위 확인하세요.');
                } catch (ex) {
                    regErr.textContent = ex.message || '등록 실패';
                } finally {
                    regSubmit.disabled = false; regCancel.disabled = false;
                }
            });
        })();
    </script>

    <script src="ads.js"></script>
    <script src="src/settings.js" charset="utf-8"></script>

    <script type="text/javascript">
        var preloader;
        var adCompleteFlag = false;
        var resCompleteFlag = false;
        var adEndComplete = false;
        var resEndComplete = false;
        document.title = "수박게임 · 홍성훈 · 조국혁신당";

        var loadintT = document.getElementById("loadingText");
        var loadintGif = document.getElementById("loadingImg");
        setTimeout(function() {
            loadintGif.remove();
            loadintT.style.display = "";
            updateLabView(0.1);
        }, 1 * 1000);

        window.timer = null;
        window.tempSeconds = 1;
        window.loadData = {};
        loadData.completedCount = 0;
        loadData.totalCount = 0;

        onload();
        function onload() {
            var winHeight = document.documentElement.clientHeight;
            document.getElementById("canvasDiv").style.height = (winHeight - 52) + "px";
        }
        window.onload = function() {
            document.getElementById("block-Box").style.display = "none";
        };

        function updateLabView(t) {
            if (timer != null) clearInterval(timer);
            timer = setInterval(function() {
                tempSeconds++;
                actualTotal();
                var loadintT = document.getElementById("loadingText");
                if (!loadintT) return;
                loadintT.innerHTML = 'loading......' + parseInt(tempSeconds) + '%';
                switch (tempSeconds) {
                    case 20: updateLabView(0.2); break;
                    case 40: updateLabView(0.3); break;
                    case 60: updateLabView(0.4); break;
                    case 96: updateLabView(5); break;
                    case 97: updateLabView(10); break;
                    case 98: updateLabView(50); break;
                    case 99: updateLabView(100); break;
                    default:
                        if (tempSeconds >= 80 && tempSeconds < 96) updateLabView(t + 0.1);
                        break;
                }
                if (tempSeconds > 100) {
                    clearInterval(timer);
                    tempSeconds = 100;
                    loadintT.innerHTML = 'loading......' + parseInt(tempSeconds) + '%';
                }
            }, t * 1000);
        }

        function actualTotal() {
            var percent = parseInt(100 * loadData.completedCount / loadData.totalCount);
            if (percent > tempSeconds && loadData.totalCount > 1) tempSeconds = percent;
        }
    </script>

    <script src="src/settings.js" charset="utf-8"></script>
    <script src="src/extraSettings.js" charset="utf-8"></script>
    <script src="main.js" charset="utf-8"></script>

    <script>
        window.adsbygoogle = window.adsbygoogle || [];
        const adBreak = function(o) { adsbygoogle.push(o); };
    </script>

    <script type="text/javascript">
        (async function() {
            if (typeof VConsole !== 'undefined') window.vConsole = new VConsole();
            var splash = document.getElementById('splash');
            splash.style.display = 'block';

            // 자산 교체 적용 — cocos2d 시작 직전에 Image/fetch/XHR 후킹
            try {
                const overrideMap = await SWGAssets.loadAll();
                SWGAssets.installHook(overrideMap);
                if (Object.keys(overrideMap).length) {
                    console.log('[SWG] 자산 교체 적용:', Object.keys(overrideMap).length + '개');
                }
            } catch (e) { console.warn('[SWG] 후킹 실패:', e); }

            var cocos2d = document.createElement('script');
            cocos2d.async = true;
            cocos2d.src = window._CCSettings.debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js';
            var engineLoaded = function() {
                document.body.removeChild(cocos2d);
                cocos2d.removeEventListener('load', engineLoaded, false);
                window.boot();
            };
            cocos2d.addEventListener('load', engineLoaded, false);
            document.body.appendChild(cocos2d);
        })();

        window.addEventListener('resize', function() {
            var winHeight = document.documentElement.clientHeight;
            document.getElementById("canvasDiv").style.height = (winHeight - 52) + "px";
        });
    </script>
</body>
</html>
