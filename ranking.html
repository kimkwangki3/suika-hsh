<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#152484">
<title>역대 순위 · 수박게임 · 홍성훈</title>
<link rel="stylesheet" href="ui-overlay.css?v=6">
<style>
  body {
    margin: 0; padding: 0;
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    color: #1A1A1A; min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(244,246,251,0.92) 0%, rgba(244,246,251,0.96) 100%),
      url('rpdla.png?v=4') center top / cover no-repeat fixed !important;
  }
  body::before { display: none !important; }

  .top {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #152484, #2a3aa8);
    color: #fff; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    border-bottom: 2px solid #00A0E9;
  }
  .top .left { display: flex; flex-direction: column; line-height: 1.2; }
  .top .name { font-weight: 900; font-size: 16px; }
  .top .sub { font-size: 10px; color: #00A0E9; letter-spacing: 0.15em; }
  .top .actions { display: flex; gap: 6px; }
  .top a, .top button {
    background: rgba(255,255,255,0.15); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .head { padding: 18px 16px 4px; position: relative; z-index: 1; }
  .head h1 { margin: 0 0 4px; font-size: 20px; font-weight: 900; color: #152484; }
  .head p { margin: 0; font-size: 12px; color: #4A4A4A; }

  .panel {
    margin: 12px 16px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(21,36,132,0.08);
    overflow: hidden;
    position: relative; z-index: 1;
  }
  .me-best {
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(0,160,233,0.10), rgba(21,36,132,0.06));
    border-bottom: 1px solid #EAEEF7;
    font-size: 13px; color: #4A4A4A;
  }
  .me-best b { color: #152484; font-weight: 900; font-size: 18px; margin: 0 4px; }
  .me-best .empty { color: #8A8A8A; }

  .add-form {
    padding: 14px 18px;
    border-bottom: 1px solid #EAEEF7;
    background: #FAFBFE;
  }
  .add-form .row { display: flex; gap: 8px; align-items: center; }
  .add-form input[type=number] {
    flex: 1; min-width: 0;
    padding: 11px 12px; border: 1.5px solid #DDE2EE;
    border-radius: 10px; font-size: 15px; background: #fff;
    -webkit-appearance: none; outline: none;
  }
  .add-form input[type=number]:focus { border-color: #00A0E9; }
  .add-form button {
    padding: 11px 16px;
    background: #00A0E9; color: #fff;
    border: none; border-radius: 10px;
    font-size: 13px; font-weight: 800; cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .add-form .hint { margin-top: 6px; font-size: 11px; color: #8A8A8A; }

  .rank-list { list-style: none; margin: 0; padding: 0; }
  .rank-row {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid #F4F6FB;
    font-size: 14px;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-row.mine { background: rgba(0,160,233,0.08); }

  .rank-num {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 50%; font-weight: 800; font-size: 13px;
    background: #EAEEF7; color: #4A4A4A;
  }
  .rank-row.r1 .rank-num { background: linear-gradient(135deg, #FFD86B, #E8A700); color: #fff; }
  .rank-row.r2 .rank-num { background: linear-gradient(135deg, #D6DBE3, #9AA3B2); color: #fff; }
  .rank-row.r3 .rank-num { background: linear-gradient(135deg, #E0A57A, #B36A3A); color: #fff; }

  .rank-user { font-weight: 700; color: #1A1A1A; word-break: break-all; }
  .rank-user .me { display: inline-block; margin-left: 6px; padding: 1px 7px; background: #00A0E9; color: #fff; border-radius: 999px; font-size: 10px; font-weight: 800; }
  .rank-score { font-variant-numeric: tabular-nums; font-weight: 800; color: #152484; font-size: 16px; }
  .rank-date { font-size: 11px; color: #8A8A8A; min-width: 80px; text-align: right; }

  .empty {
    padding: 60px 20px; text-align: center;
    color: #8A8A8A; font-size: 14px;
  }
  .empty .ico { font-size: 36px; margin-bottom: 8px; opacity: .6; }

  .danger-btn {
    margin: 18px 16px 100px;
    display: block; width: calc(100% - 32px);
    padding: 11px; font-size: 12px; font-weight: 700;
    background: #fff; color: #E54848;
    border: 1.5px solid #f5c8c8; border-radius: 10px; cursor: pointer;
    position: relative; z-index: 1;
  }

  @media (max-width: 480px) {
    .rank-row { grid-template-columns: 36px 1fr auto; gap: 8px; padding: 10px 14px; font-size: 13px; }
    .rank-date { display: none; }
    .rank-score { font-size: 15px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="left">
    <span class="name">역대 순위</span>
    <span class="sub">홍 성 훈 · 조 국 혁 신 당</span>
  </div>
  <div class="actions">
    <a href="index.html">게임</a>
    <button id="btnLogout">로그아웃</button>
  </div>
</header>

<div class="head">
  <h1>🏆 역대 순위 TOP 50</h1>
  <p>게임 종료 후 자신의 점수를 직접 등록하면 순위에 반영됩니다.</p>
</div>

<div class="panel">
  <div class="me-best" id="meBest"></div>
  <form class="add-form" id="addForm">
    <div class="row">
      <input type="number" id="scoreInput" placeholder="내 점수 입력 (예: 1234)" min="0" max="999999" inputmode="numeric">
      <button type="submit">등록</button>
    </div>
    <div class="hint">사용자 <b id="curUser">-</b> 이름으로 등록됩니다.</div>
  </form>
  <ul class="rank-list" id="rankList"></ul>
  <div class="empty" id="emptyBox" style="display:none">
    <div class="ico">🍉</div>
    아직 등록된 점수가 없습니다.<br>첫 점수를 등록해보세요!
  </div>
</div>

<button class="danger-btn" id="btnClear">전체 순위 초기화 (관리자)</button>

<script src="js/swg-app.js?v=4"></script>
<script>
(async () => {
  await SWGApp.init();
  const sess = SWGApp.require('login.html');
  if (!sess) return;

  document.getElementById('curUser').textContent = sess.u;
  document.getElementById('btnLogout').addEventListener('click', () => {
    SWGApp.logout(); location.href = 'login.html';
  });

  // 관리자만 초기화 버튼 노출
  const clearBtn = document.getElementById('btnClear');
  if (sess.role !== 'admin') clearBtn.style.display = 'none';
  clearBtn.addEventListener('click', () => {
    if (!confirm('정말 모든 순위를 삭제하시겠습니까?')) return;
    SWGScore.clearAll();
    render();
  });

  function fmtDate(ts) {
    const d = new Date(ts);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    const list = SWGScore.top(50);
    const ul = document.getElementById('rankList');
    const empty = document.getElementById('emptyBox');
    ul.innerHTML = '';
    if (!list.length) { empty.style.display = ''; }
    else { empty.style.display = 'none'; }

    list.forEach((row, i) => {
      const rank = i + 1;
      const li = document.createElement('li');
      li.className = 'rank-row r' + rank + (row.u === sess.u ? ' mine' : '');
      const isMe = row.u === sess.u;
      li.innerHTML = `
        <span class="rank-num">${rank}</span>
        <span class="rank-user">${escapeHtml(row.u)}${isMe ? '<span class="me">나</span>' : ''}</span>
        <span class="rank-score">${row.s.toLocaleString()}</span>
        <span class="rank-date">${fmtDate(row.d)}</span>
      `;
      ul.appendChild(li);
    });

    // 내 최고
    const best = SWGScore.myBest(sess.u);
    document.getElementById('meBest').innerHTML = best
      ? `내 최고 점수: <b>${best.s.toLocaleString()}</b>점 <span style="color:#8A8A8A;font-size:11px">(${fmtDate(best.d)})</span>`
      : '<span class="empty">아직 내 점수가 없습니다. 게임 후 등록해보세요.</span>';
  }

  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const v = parseInt(document.getElementById('scoreInput').value, 10);
    if (!Number.isFinite(v) || v < 0) { alert('점수를 올바르게 입력하세요'); return; }
    try {
      SWGScore.add(sess.u, v);
      document.getElementById('scoreInput').value = '';
      render();
    } catch (ex) { alert(ex.message); }
  });

  render();
})();
</script>
</body>
</html>
