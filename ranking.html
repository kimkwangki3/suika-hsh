<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#152484">
<title>순위 · 수박게임 · 홍성훈</title>
<link rel="stylesheet" href="ui-overlay.css?v=8">
<style>
  body {
    margin: 0; padding: 0;
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    color: #1A1A1A; min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(244,246,251,0.92) 0%, rgba(244,246,251,0.96) 100%),
      url('rpdla.png?v=4') center top / cover no-repeat fixed !important;
  }
  body::before { display: none !important; }

  .top {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #152484, #2a3aa8);
    color: #fff; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    border-bottom: 2px solid #00A0E9;
  }
  .top .left { display: flex; flex-direction: column; line-height: 1.2; }
  .top .name { font-weight: 900; font-size: 16px; }
  .top .sub { font-size: 10px; color: #00A0E9; letter-spacing: 0.15em; }
  .top a {
    background: rgba(255,255,255,0.15); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .head { padding: 18px 16px 4px; position: relative; z-index: 1; }
  .head h1 { margin: 0 0 4px; font-size: 20px; font-weight: 900; color: #152484; }
  .head p { margin: 0; font-size: 12px; color: #4A4A4A; }

  .panel {
    margin: 12px 16px 6px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(21,36,132,0.08);
    overflow: hidden;
    position: relative; z-index: 1;
  }

  .rank-list { list-style: none; margin: 0; padding: 0; }
  .rank-row {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid #F4F6FB;
    font-size: 14px;
  }
  .rank-row:last-child { border-bottom: none; }

  .rank-num {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 50%; font-weight: 800; font-size: 13px;
    background: #EAEEF7; color: #4A4A4A;
  }
  .rank-row.r1 .rank-num { background: linear-gradient(135deg, #FFD86B, #E8A700); color: #fff; }
  .rank-row.r2 .rank-num { background: linear-gradient(135deg, #D6DBE3, #9AA3B2); color: #fff; }
  .rank-row.r3 .rank-num { background: linear-gradient(135deg, #E0A57A, #B36A3A); color: #fff; }

  .rank-user { font-weight: 700; color: #1A1A1A; word-break: break-all; overflow: hidden; }
  .rank-score { font-variant-numeric: tabular-nums; font-weight: 800; color: #152484; font-size: 16px; }
  .rank-date { font-size: 11px; color: #8A8A8A; min-width: 80px; text-align: right; }

  .empty {
    padding: 60px 20px; text-align: center;
    color: #8A8A8A; font-size: 14px;
  }
  .empty .ico { font-size: 36px; margin-bottom: 8px; opacity: .6; }

  .pager {
    display: flex; gap: 8px; justify-content: center;
    margin: 14px 16px 80px; position: relative; z-index: 1;
  }
  .pager button {
    flex: 0 0 auto;
    min-width: 64px; padding: 10px 14px;
    border: 1.5px solid #DDE2EE; background: #fff;
    color: #4A4A4A; border-radius: 10px;
    font-size: 13px; font-weight: 800;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .pager button.active {
    background: linear-gradient(135deg, #152484, #00A0E9);
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 12px rgba(21,36,132,0.25);
  }
  .pager button:disabled { opacity: 0.45; cursor: not-allowed; }

  .loading {
    padding: 40px 20px; text-align: center;
    color: #8A8A8A; font-size: 13px;
  }

  @media (max-width: 480px) {
    .rank-row { grid-template-columns: 36px 1fr auto; gap: 8px; padding: 10px 14px; font-size: 13px; }
    .rank-date { display: none; }
    .rank-score { font-size: 15px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="left">
    <span class="name">🏆 순위 보기</span>
    <span class="sub">홍 성 훈 · 조 국 혁 신 당</span>
  </div>
  <a href="index.html">← 게임</a>
</header>

<div class="head">
  <h1>🏆 명예의 전당 TOP 30</h1>
  <p>10위씩 페이지로 보여드립니다.</p>
</div>

<div class="panel">
  <ul class="rank-list" id="rankList"></ul>
  <div class="loading" id="loading">불러오는 중...</div>
  <div class="empty" id="emptyBox" style="display:none">
    <div class="ico">🍉</div>
    아직 등록된 점수가 없습니다.<br>게임 페이지에서 점수를 등록하세요!
  </div>
</div>

<div class="pager" id="pager">
  <button data-page="1">1~10위</button>
  <button data-page="2">11~20위</button>
  <button data-page="3">21~30위</button>
</div>

<script>
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(ts) {
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

let currentPage = 1;

async function load(page) {
  currentPage = page;
  const ul = document.getElementById('rankList');
  const empty = document.getElementById('emptyBox');
  const loading = document.getElementById('loading');
  ul.innerHTML = '';
  empty.style.display = 'none';
  loading.style.display = '';

  // 페이저 active 표시
  document.querySelectorAll('#pager button').forEach(b => {
    b.classList.toggle('active', String(page) === b.dataset.page);
  });

  try {
    const res = await fetch(`/api/top?page=${page}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('api');
    const data = await res.json();
    loading.style.display = 'none';
    if (!data.rows.length) {
      empty.style.display = '';
      return;
    }
    const startRank = (page - 1) * 10;
    ul.innerHTML = data.rows.map((r, i) => {
      const rank = startRank + i + 1;
      const cls = rank <= 3 ? `r${rank}` : '';
      return `
        <li class="rank-row ${cls}">
          <div class="rank-num">${rank}</div>
          <div class="rank-user">${escapeHtml(r.nickname)}</div>
          <div class="rank-score">${Number(r.score).toLocaleString()}</div>
          <div class="rank-date">${fmtDate(r.created_at)}</div>
        </li>
      `;
    }).join('');
  } catch (e) {
    loading.textContent = '순위를 불러오지 못했습니다';
  }
}

document.querySelectorAll('#pager button').forEach(b => {
  b.addEventListener('click', () => load(parseInt(b.dataset.page, 10)));
});

load(1);
</script>
</body>
</html>
