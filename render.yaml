databases:
  - name: suika-hsh-db
    plan: free
    databaseName: suika
    user: suika

services:
  - type: web
    name: suika-hsh
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: suika-hsh-db
          property: connectionString
    pullRequestPreviewsEnabled: false
